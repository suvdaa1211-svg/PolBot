<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tally Redirect</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <p>Түр хүлээнэ үү...</p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user;

    const telegramId = user?.id || "";
    const username = user?.username || "";
    const fullName = `${user?.first_name || ""} ${user?.last_name || ""}`.trim();

    const tallyUrl =
      `https://tally.so/r/0QLA1y?telegram_id=${encodeURIComponent(telegramId)}&telegram_username=${encodeURIComponent(username)}&full_name=${encodeURIComponent(fullName)}`;

    window.location.href = tallyUrl;
  </script>
</body>
</html>
